# Metatron roda embedded no Orchestrator na Fase 1.
# Este manifest será usado na Fase 2+ quando cada agente virar pod independente.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metatron
  namespace: agent-platform
  labels:
    app: metatron
    component: agent
    phase: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metatron
  template:
    metadata:
      labels:
        app: metatron
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8010"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: metatron
          image: agent-platform/metatron:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8010
              name: http
          env:
            - name: AGENT_NAME
              value: "Metatron"
            - name: AGENT_PORT
              value: "8010"
            - name: REDIS_URL
              value: "redis://redis.agent-platform.svc.cluster.local:6379"
            - name: NATS_URL
              value: "nats://nats.agent-platform.svc.cluster.local:4222"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: anthropic-api-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: metatron
  namespace: agent-platform
  labels:
    app: metatron
spec:
  selector:
    app: metatron
  ports:
    - name: http
      port: 8010
      targetPort: 8010
  type: ClusterIP
