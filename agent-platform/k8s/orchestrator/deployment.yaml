apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agent-platform
  labels:
    app: orchestrator
    component: brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: orchestrator
          image: agent-platform/orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: PORT
              value: "8001"
            - name: REDIS_URL
              value: "redis://redis.agent-platform.svc.cluster.local:6379"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: anthropic-api-key
            - name: CLAUDE_MODEL
              value: "claude-sonnet-4-6"
            - name: ENV
              value: "production"
            - name: PROMETHEUS_URL
              value: "http://prometheus.observability.svc.cluster.local:9090"
            - name: LOKI_URL
              value: "http://loki.observability.svc.cluster.local:3100"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: agent-platform
  labels:
    app: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
