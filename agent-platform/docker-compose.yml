name: agent-platform

services:

  # ─── Infraestrutura ──────────────────────────────────────────────────────────

  redis:
    image: redis:7.2-alpine
    container_name: ap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - agent-net

  nats:
    image: nats:2.10-alpine
    container_name: ap-nats
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    command: ["-js", "-m", "8222"]
    networks:
      - agent-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ap-qdrant
    ports:
      - "6333:6333"   # REST API + dashboard  →  http://localhost:6333/dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    # Sem healthcheck — imagem Rust minimalista sem curl/wget
    # Orchestrator tem degradação graciosa se Qdrant não estiver pronto
    networks:
      - agent-net
    restart: unless-stopped

  # ─── Go Gateway ─────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ap-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ORCHESTRATOR_URL: "http://orchestrator:8001"
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - agent-net
    restart: unless-stopped

  # ─── Python Orchestrator ────────────────────────────────────────────────────

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: ap-orchestrator
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
      REDIS_URL: "redis://redis:6379"
      NATS_URL: "nats://nats:4222"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
      ENV: "production"
      PYTHONPATH: "/app"
      # Observabilidade — aponta para k8s NodePorts locais (Fase 2)
      PROMETHEUS_URL: "${PROMETHEUS_URL:-http://host.docker.internal:30090}"
      LOKI_URL: "${LOKI_URL:-http://host.docker.internal:3100}"
      QDRANT_URL: "http://qdrant:6333"
      # Metatron file storage
      METATRON_FILES_DIR: "/data/metatron-files"
      # Microserviços CyberT e Zerocool (Option B)
      CYBERT_URL: "http://cybert:8004"
      ZEROCOOL_URL: "http://zerocool:8005"
    volumes:
      - metatron-files:/data/metatron-files
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      qdrant:
        condition: service_started
      cybert:
        condition: service_healthy
      zerocool:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agent-net
    restart: unless-stopped

  # ─── CyberT — Segurança e Auditoria (microserviço independente) ─────────────

  cybert:
    build:
      context: .
      dockerfile: agents/cybert/Dockerfile
    container_name: ap-cybert
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
      NATS_URL: "nats://nats:4222"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
      PYTHONPATH: "/app"
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agent-net
    restart: unless-stopped

  # ─── Zerocool — Pentesting Autorizado (microserviço independente) ────────────

  zerocool:
    build:
      context: .
      dockerfile: agents/zerocool/Dockerfile
    container_name: ap-zerocool
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
      REDIS_URL: "redis://redis:6379"
      NATS_URL: "nats://nats:4222"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
      PYTHONPATH: "/app"
      PENTEST_REPORTS_DIR: "/app/reports"
      METATRON_FILES_DIR: "/data/metatron-files"
    volumes:
      - zerocool-reports:/app/reports
      - metatron-files:/data/metatron-files
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agent-net
    restart: unless-stopped

  # ─── Web UI ──────────────────────────────────────────────────────────────────

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ap-web
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - agent-net
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  metatron-files:
    driver: local
  zerocool-reports:
    driver: local

networks:
  agent-net:
    driver: bridge
